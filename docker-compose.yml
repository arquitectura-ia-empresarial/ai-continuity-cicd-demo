services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-continuity-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  pull-model:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      echo "Waiting for Ollama..."
      until ollama list >/dev/null 2>&1; do sleep 2; done
      echo "Pulling model: $${OLLAMA_MODEL}"
      ollama pull "$${OLLAMA_MODEL}"

  demo-ollama:
    image: python:3.12-slim
    depends_on:
      - ollama
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-90}
    command: |
      sh -c "python -m unittest discover -s tests && python scripts/run_ci_demo.py --ai-provider ollama --ollama-base-url http://ollama:11434 --ollama-model $${OLLAMA_MODEL} --ai-timeout-seconds $${AI_TIMEOUT_SECONDS} --reports-dir reports/ollama"

volumes:
  ollama-data:
